<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Completa - Objetos con Imágenes</title>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES CSS & TEMA --- */
        :root {
            --primary: #ff5350;
            --secondary: #2a75bb;
            --bg-body: #f6f8fc;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
            
            /* Colores de Tipos */
            --type-normal: #A8A77A;
            --type-fire: #EE8130;
            --type-water: #6390F0;
            --type-electric: #F7D02C;
            --type-grass: #7AC74C;
            --type-ice: #96D9D6;
            --type-fighting: #C22E28;
            --type-poison: #A33EA1;
            --type-ground: #E2BF65;
            --type-flying: #A98FF3;
            --type-psychic: #F95587;
            --type-bug: #A6B91A;
            --type-rock: #B6A136;
            --type-ghost: #735797;
            --type-dragon: #6F35FC;
            --type-dark: #705746;
            --type-steel: #B7B7CE;
            --type-fairy: #D685AD;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f0f0f0;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* --- HEADER & NAV --- */
        header {
            background-color: var(--bg-card);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.5rem; color: var(--primary); font-weight: 700; }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-main);
            transition: var(--transition);
        }
        .theme-toggle:hover { transform: rotate(15deg); color: var(--primary); }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        .nav-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 30px;
            background-color: var(--bg-card);
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* --- MAIN CONTAINER --- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .view-section { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SEARCH BAR --- */
        .search-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 1rem 1.5rem;
            padding-right: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 83, 80, 0.1); }
        
        .search-icon {
            position: absolute;
            right: calc(50% - 220px);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }
        @media (max-width: 540px) { .search-icon { right: 1.5rem; } }

        /* --- GRID SYSTEMS --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* --- POKEMON CARD --- */
        .card {
            background-color: var(--bg-card);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }

        .card-id {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        
        .card:hover img { transform: scale(1.1); }

        .card-name {
            text-transform: capitalize;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .types-container { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }

        .type-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            color: white;
            font-size: 0.75rem;
            text-transform: capitalize;
            font-weight: 500;
        }

        /* --- TYPE CARD --- */
        .type-card {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: capitalize;
        }
        .type-card i { font-size: 2rem; margin-bottom: 0.5rem; }

        /* --- ITEM CARD --- */
        .item-card img {
            width: 80px;
            height: 80px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }
        .item-name { font-size: 1rem; font-weight: 600; text-transform: capitalize; }

        /* --- LOADING SPINNER --- */
        .loader {
            display: none;
            border: 4px solid var(--bg-card);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal-content {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.open .modal-content { transform: scale(1); }

        .modal-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body { padding: 1.5rem; }

        .detail-header { text-align: center; margin-bottom: 1.5rem; }
        .detail-img { width: 150px; height: 150px; object-fit: contain; }
        .detail-id { color: var(--text-secondary); font-weight: 600; }
        .detail-name { font-size: 2rem; text-transform: capitalize; margin: 0.5rem 0; }

        .evolution-chain {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .evo-step { display: flex; align-items: center; gap: 1rem; width: 100%; justify-content: center; }
        .evo-pokemon { text-align: center; cursor: pointer; }
        .evo-pokemon img { width: 60px; height: 60px; }
        .evo-arrow { color: var(--text-secondary); font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; max-width: 80px; }
        .evo-condition { font-size: 0.7rem; text-align: center; margin-bottom: 2px; background: var(--bg-body); padding: 2px 5px; border-radius: 4px; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3rem; }
        .info-label { color: var(--text-secondary); font-weight: 500; }
        
        .flavor-text { font-style: italic; color: var(--text-secondary); text-align: center; margin-bottom: 1rem; font-size: 0.9rem; line-height: 1.5; }

        /* NUEVO ESTILO: Mini tarjeta de Pokemon con imagen */
        .mini-pokemon-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-body);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-main);
            text-transform: capitalize;
        }

        .mini-pokemon-card:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .mini-pokemon-card img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .held-by-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .mini-tag { background: var(--bg-body); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: capitalize; cursor: pointer; border: 1px solid var(--border-color); }

        /* --- SENTINEL --- */
        .sentinel {
            height: 20px;
            width: 100%;
            margin-top: 2rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            header { padding: 1rem; }
            h1 { font-size: 1.2rem; }
            .nav-btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .card { padding: 1rem; }
            .card img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1><i class="fas fa-gamepad"></i> Pokédex Rápida</h1>
        <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <!-- Navegación -->
    <nav>
        <button class="nav-btn active" data-tab="pokemon">
            <i class="fas fa-paw"></i> Pokémon
        </button>
        <button class="nav-btn" data-tab="types">
            <i class="fas fa-layer-group"></i> Elementos
        </button>
        <button class="nav-btn" data-tab="items">
            <i class="fas fa-box-open"></i> Objetos
        </button>
    </nav>

    <!-- Contenedor Principal -->
    <main id="app">
        
        <!-- VISTA POKÉMON -->
        <section id="view-pokemon" class="view-section active">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="pokemonSearch" class="search-input" placeholder="Buscar (ej. Pikachu, Mewtwo, 150)..." autocomplete="off">
            </div>
            <div id="pokemonGrid" class="grid-container"></div>
            <div class="loader" id="pokeLoader"></div>
            <div id="pokemonSentinel" class="sentinel"></div>
        </section>

        <!-- VISTA TIPOS -->
        <section id="view-types" class="view-section">
            <div class="search-container">
                <input type="text" id="typeSearch" class="search-input" placeholder="Buscar tipo...">
            </div>
            <div id="typesGrid" class="grid-container"></div>
        </section>

        <!-- VISTA OBJETOS -->
        <section id="view-items" class="view-section">
            <div class="search-container">
                <input type="text" id="itemSearch" class="search-input" placeholder="Buscar objeto...">
            </div>
            <div id="itemsGrid" class="grid-container"></div>
            <div class="loader" id="itemLoader"></div>
            <div id="itemSentinel" class="sentinel"></div>
        </section>

    </main>

    <!-- MODAL GENÉRICO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalle</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script>
        /**
         * CONFIGURACIÓN Y ESTADO
         */
        const STATE = {
            currentTab: 'pokemon',
            pokemonOffset: 0,
            pokemonLimit: 24,
            itemOffset: 0,
            itemLimit: 50,
            allPokemonCache: [], 
            masterPokemonList: [], 
            isLoading: false, 
            darkMode: false
        };

        const API = {
            base: 'https://pokeapi.co/api/v2/',
            pokemon: (offset, limit) => `pokemon?offset=${offset}&limit=${limit}`,
            pokemonData: (id) => `pokemon/${id}`,
            species: (id) => `pokemon-species/${id}`,
            evolution: (id) => `evolution-chain/${id}`,
            type: (id) => `type/${id}`,
            item: (offset, limit) => `item?offset=${offset}&limit=${limit}`,
            itemData: (name) => `item/${name}`
        };

        const TYPE_MAP = {
            normal: 'Normal', fire: 'Fuego', water: 'Agua', grass: 'Planta',
            electric: 'Eléctrico', ice: 'Hielo', fighting: 'Lucha', poison: 'Veneno',
            ground: 'Tierra', flying: 'Volador', psychic: 'Psíquico', bug: 'Bicho',
            rock: 'Roca', ghost: 'Fantasma', dragon: 'Dragón', steel: 'Acero',
            dark: 'Siniestro', fairy: 'Hada'
        };

        /**
         * INICIALIZACIÓN
         */
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            initTabs();
            setupInfiniteScroll();

            await loadMasterPokemonList();
            loadPokemon();
            loadTypes();
            loadItems();

            document.getElementById('pokemonSearch').addEventListener('input', debounce(handlePokemonSearch, 300));
            document.getElementById('typeSearch').addEventListener('input', debounce(handleTypeSearch, 300));
            document.getElementById('itemSearch').addEventListener('input', debounce(handleItemSearch, 300));
        });

        /**
         * OPTIMIZACIÓN: Lista Maestra
         */
        async function loadMasterPokemonList() {
            try {
                const res = await fetch(API.base + 'pokemon?limit=10000');
                const data = await res.json();
                STATE.masterPokemonList = data.results;
            } catch (error) {
                console.error("Error cargando lista maestra:", error);
            }
        }

        /**
         * INFINITE SCROLL
         */
        function setupInfiniteScroll() {
            const options = { root: null, rootMargin: '0px', threshold: 0.1 };
            const observerCallback = (entries, observerTarget) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !STATE.isLoading && STATE.currentTab === observerTarget.tab) {
                        const searchId = observerTarget.searchId;
                        const searchTerm = document.getElementById(searchId).value.trim();
                        if (searchTerm === '') {
                            if(observerTarget.tab === 'pokemon') loadPokemon();
                            if(observerTarget.tab === 'items') loadItems();
                        }
                    }
                });
            };
            const pokemonObserver = new IntersectionObserver((entries) => observerCallback(entries, {tab: 'pokemon', searchId: 'pokemonSearch'}), options);
            const itemObserver = new IntersectionObserver((entries) => observerCallback(entries, {tab: 'items', searchId: 'itemSearch'}), options);
            const pokemonSentinel = document.getElementById('pokemonSentinel');
            const itemSentinel = document.getElementById('itemSentinel');
            if(pokemonSentinel) pokemonObserver.observe(pokemonSentinel);
            if(itemSentinel) itemObserver.observe(itemSentinel);
        }

        /**
         * TEMA Y NAVEGACIÓN
         */
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const icon = document.querySelector('#themeToggle i');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                icon.className = 'fas fa-sun';
                STATE.darkMode = true;
            }
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                STATE.darkMode = !STATE.darkMode;
                icon.className = STATE.darkMode ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('theme', STATE.darkMode ? 'dark' : 'light');
            });
        }

        function initTabs() {
            const tabs = document.querySelectorAll('.nav-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`view-${tab.dataset.tab}`).classList.add('active');
                    STATE.currentTab = tab.dataset.tab;
                });
            });
        }

        /**
         * POKEMON LOGIC
         */
        async function loadPokemon() {
            if (STATE.isLoading) return;
            STATE.isLoading = true;
            const loader = document.getElementById('pokeLoader');
            loader.style.display = 'block';
            try {
                const response = await fetch(API.base + API.pokemon(STATE.pokemonOffset, STATE.pokemonLimit));
                const data = await response.json();
                STATE.pokemonOffset += STATE.pokemonLimit;
                const promises = data.results.map(async (p) => {
                    const res = await fetch(API.base + API.pokemonData(getIdFromUrl(p.url)));
                    const details = await res.json();
                    details.spanishName = await getSpanishName(details.species.url);
                    return details;
                });
                const pokemonDetails = await Promise.all(promises);
                pokemonDetails.forEach(p => STATE.allPokemonCache.push(p));
                renderPokemonGrid(pokemonDetails);
            } catch (error) {
                console.error("Error cargando Pokémon:", error);
            } finally {
                loader.style.display = 'none';
                STATE.isLoading = false;
            }
        }

        async function getSpanishName(speciesUrl) {
            try {
                const res = await fetch(speciesUrl);
                const data = await res.json();
                const nameObj = data.names.find(n => n.language.name === 'es');
                return nameObj ? nameObj.name : data.name;
            } catch (e) { return 'Unknown'; }
        }

        function renderPokemonGrid(pokemonList) {
            const grid = document.getElementById('pokemonGrid');
            const fragment = document.createDocumentFragment();
            pokemonList.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openPokemonModal(p);
                const typesHtml = p.types.map(t => {
                    const typeName = TYPE_MAP[t.type.name] || t.type.name;
                    const colorVar = `var(--type-${t.type.name})`;
                    return `<span class="type-badge" style="background-color: ${colorVar}">${typeName}</span>`;
                }).join('');
                const imgSrc = p.sprites.other['official-artwork'].front_default || p.sprites.front_default;
                card.innerHTML = `
                    <span class="card-id">#${p.id.toString().padStart(4, '0')}</span>
                    <img src="${imgSrc}" alt="${p.name}" loading="lazy">
                    <h3 class="card-name">${p.spanishName}</h3>
                    <div class="types-container">${typesHtml}</div>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
        }

        async function handlePokemonSearch(e) {
            const term = e.target.value.toLowerCase().trim();
            const grid = document.getElementById('pokemonGrid');
            grid.innerHTML = '';
            if (term === '') {
                STATE.allPokemonCache.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `pkm-card-${p.id}`;
                    card.onclick = () => openPokemonModal(p);
                    const typesHtml = p.types.map(t => {
                        const typeName = TYPE_MAP[t.type.name] || t.type.name;
                        const colorVar = `var(--type-${t.type.name})`;
                        return `<span class="type-badge" style="background-color: ${colorVar}">${typeName}</span>`;
                    }).join('');
                    const imgSrc = p.sprites.other['official-artwork'].front_default || p.sprites.front_default;
                    card.innerHTML = `
                        <span class="card-id">#${p.id.toString().padStart(4, '0')}</span>
                        <img src="${imgSrc}" alt="${p.name}" loading="lazy">
                        <h3 class="card-name">${p.spanishName}</h3>
                        <div class="types-container">${typesHtml}</div>
                    `;
                    grid.appendChild(card);
                });
                return;
            }
            const matches = STATE.masterPokemonList.filter(p => p.name.includes(term));
            const limitedMatches = matches.slice(0, 20);
            if (limitedMatches.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%;">No se encontraron Pokémon.</p>';
                return;
            }
            const cachedResults = [];
            const idsToFetch = [];
            limitedMatches.forEach(match => {
                const id = getIdFromUrl(match.url);
                const cached = STATE.allPokemonCache.find(p => p.id === id);
                if (cached) { cachedResults.push(cached); } else { idsToFetch.push(id); }
            });
            renderPokemonGrid(cachedResults);
            if (idsToFetch.length > 0) {
                const loader = document.getElementById('pokeLoader');
                loader.style.display = 'block';
                const fetchPromises = idsToFetch.map(async (id) => {
                    const res = await fetch(API.base + API.pokemonData(id));
                    const details = await res.json();
                    details.spanishName = await getSpanishName(details.species.url);
                    STATE.allPokemonCache.push(details);
                    return details;
                });
                const newDetails = await Promise.all(fetchPromises);
                loader.style.display = 'none';
                renderPokemonGrid(newDetails);
            }
        }

        async function openPokemonModal(pokemon) {
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            modalTitle.innerText = `#${pokemon.id.toString().padStart(4, '0')} ${pokemon.spanishName}`;
            modalBody.innerHTML = '<div class="loader" style="display:block"></div>';
            openModal();
            try {
                const speciesRes = await fetch(pokemon.species.url);
                const speciesData = await speciesRes.json();
                const flavorEntry = speciesData.flavor_text_entries.find(e => e.language.name === 'es');
                const description = flavorEntry ? flavorEntry.flavor_text.replace(/\f/g, ' ') : 'Descripción no disponible.';
                const genus = speciesData.genera.find(g => g.language.name === 'es')?.genus || '';
                let evoHtml = '<p>Sin datos de evolución.</p>';
                if (speciesData.evolution_chain) {
                    const evoRes = await fetch(speciesData.evolution_chain.url);
                    const evoData = await evoRes.json();
                    evoHtml = await parseEvolutionChain(evoData.chain);
                }
                const typesHtml = pokemon.types.map(t => {
                    const typeName = TYPE_MAP[t.type.name] || t.type.name;
                    const colorVar = `var(--type-${t.type.name})`;
                    return `<span class="type-badge" style="background-color: ${colorVar}; font-size: 1rem;">${typeName}</span>`;
                }).join('');
                const imgSrc = pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default;
                modalBody.innerHTML = `
                    <div class="detail-header">
                        <img src="${imgSrc}" class="detail-img">
                        <p class="detail-id">${genus}</p>
                        <div class="types-container" style="margin-top:10px;">${typesHtml}</div>
                    </div>
                    <div class="flavor-text">${description}</div>
                    <h4 style="margin: 1rem 0; border-bottom: 1px solid var(--border-color);">Cadena Evolutiva</h4>
                    <div class="evolution-chain">${evoHtml}</div>
                    <div style="margin-top: 1.5rem;">
                        <h4>Stats Base</h4>
                        ${pokemon.stats.map(s => `
                            <div class="info-row">
                                <span class="info-label">${translateStat(s.stat.name)}</span>
                                <b>${s.base_stat}</b>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error(error);
                modalBody.innerHTML = '<p>Error cargando detalles.</p>';
            }
        }

        function translateStat(name) {
            const map = { 'hp': 'PS', 'attack': 'Ataque', 'defense': 'Defensa', 'special-attack': 'Atq. Esp', 'special-defense': 'Def. Esp', 'speed': 'Velocidad' };
            return map[name] || name;
        }

        async function parseEvolutionChain(chain) {
            const currentName = await getSpanishName(chain.species.url);
            const id = getIdFromUrl(chain.species.url);
            const img = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
            if (chain.evolves_to.length === 0) {
                return `<div class="evo-pokemon"><img src="${img}"><div>${currentName}</div></div>`;
            }
            const nextEvo = chain.evolves_to[0];
            const nextName = await getSpanishName(nextEvo.species.url);
            const nextId = getIdFromUrl(nextEvo.species.url);
            const nextImg = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${nextId}.png`;
            const details = nextEvo.evolution_details[0];
            let conditionText = 'Subir de nivel';
            if (details) {
                if (details.trigger.name === 'use-item') {
                    let itemName = details.item.name;
                    try {
                        const itemRes = await fetch(details.item.url);
                        const itemData = await itemRes.json();
                        const esName = itemData.names.find(n => n.language.name === 'es');
                        itemName = esName ? esName.name : itemName;
                    } catch(e) {}
                    conditionText = `Usar ${itemName}`;
                } else if (details.trigger.name === 'trade') {
                    conditionText = details.held_item ? `Intercambio c/ ${details.held_item.name}` : 'Intercambio';
                } else if (details.min_level) {
                    conditionText = `Nivel ${details.min_level}`;
                }
            }
            const restOfChain = await parseEvolutionChain(nextEvo);
            return `
                <div class="evo-step">
                    <div class="evo-pokemon" onclick="window.location.hash='#view-pokemon'">
                        <img src="${img}"><div>${currentName}</div>
                    </div>
                    <div class="evo-arrow">
                        <span class="evo-condition">${conditionText}</span><i class="fas fa-arrow-down"></i>
                    </div>
                    ${restOfChain}
                </div>`;
        }

        /**
         * ITEMS LOGIC (ACTUALIZADA CON IMÁGENES)
         */
        async function loadTypes() {
            try {
                const res = await fetch(API.base + 'type?limit=18');
                const data = await res.json();
                renderTypesGrid(data.results);
            } catch (e) { console.error(e); }
        }

        function renderTypesGrid(types) {
            const grid = document.getElementById('typesGrid');
            grid.innerHTML = '';
            types.forEach(t => {
                const colorVar = `var(--type-${t.name})`;
                const card = document.createElement('div');
                card.className = 'card type-card';
                card.style.backgroundColor = colorVar;
                card.innerHTML = `<i class="fas fa-bolt"></i><span>${TYPE_MAP[t.name] || t.name}</span>`;
                card.onclick = () => openTypeModal(t);
                grid.appendChild(card);
            });
        }

        async function handleTypeSearch(e) {
            const term = e.target.value.toLowerCase();
            if(term === '') { loadTypes(); return; }
            const cards = document.querySelectorAll('.type-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        }

        async function openTypeModal(type) {
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            const typeNameEs = TYPE_MAP[type.name] || type.name;
            const colorVar = `var(--type-${type.name})`;
            modalTitle.innerText = typeNameEs;
            modalTitle.style.color = colorVar;
            modalBody.innerHTML = '<div class="loader" style="display:block"></div>';
            openModal();

            try {
                const res = await fetch(API.base + API.type(type.name));
                const data = await res.json();
                const doubleDamageTo = data.damage_relations.double_damage_to.map(t => TYPE_MAP[t.name] || t.name).join(', ');
                const doubleDamageFrom = data.damage_relations.double_damage_from.map(t => TYPE_MAP[t.name] || t.name).join(', ');
                
                // Aquí también generamos las mini tarjetas para consistencia
                const pokemonList = data.pokemon.slice(0, 20).map(p => {
                    const id = getIdFromUrl(p.pokemon.url);
                    const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
                    return `
                        <div class="mini-pokemon-card" onclick="fetchPokemonById(${id})">
                            <img src="${imgUrl}" loading="lazy">
                            <span>${p.pokemon.name}</span>
                        </div>`;
                }).join('');

                modalBody.innerHTML = `
                    <div style="background:${colorVar}; color:white; padding:1rem; border-radius:10px; text-align:center; margin-bottom:1rem;"><h3>${typeNameEs}</h3></div>
                    <div class="info-row"><span class="info-label">Fuerte contra</span><span style="color:green; font-weight:600;">${doubleDamageTo || 'Ninguno'}</span></div>
                    <div class="info-row"><span class="info-label">Débil contra</span><span style="color:red; font-weight:600;">${doubleDamageFrom || 'Ninguno'}</span></div>
                    <h4 style="margin:1rem 0;">Pokémon de este tipo (Primeros 20):</h4>
                    <div class="held-by-list">${pokemonList}</div>
                `;
            } catch (e) { modalBody.innerHTML = 'Error cargando tipo.'; }
        }

        async function loadItems() {
            if (STATE.isLoading) return;
            STATE.isLoading = true;
            const loader = document.getElementById('itemLoader');
            loader.style.display = 'block';
            try {
                const res = await fetch(API.base + API.item(STATE.itemOffset, STATE.itemLimit));
                const data = await res.json();
                STATE.itemOffset += STATE.itemLimit;
                renderItemsGrid(data.results);
            } catch (e) { console.error(e); }
            loader.style.display = 'none';
            STATE.isLoading = false;
        }

        function renderItemsGrid(items) {
            const grid = document.getElementById('itemsGrid');
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card item-card';
                const imgSrc = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${item.name}.png`;
                card.innerHTML = `
                    <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/96?text=?'">
                    <div class="item-name">${formatItemName(item.name)}</div>
                `;
                card.onclick = () => openItemModal(item);
                grid.appendChild(card);
            });
        }

        function formatItemName(name) {
            return name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        async function handleItemSearch(e) {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.item-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }

        async function openItemModal(item) {
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            modalTitle.innerText = formatItemName(item.name);
            modalBody.innerHTML = '<div class="loader" style="display:block"></div>';
            openModal();

            try {
                const res = await fetch(API.base + API.itemData(item.name));
                const data = await res.json();

                const esNameObj = data.names.find(n => n.language.name === 'es');
                const displayName = esNameObj ? esNameObj.name : formatItemName(item.name);
                modalTitle.innerText = displayName;

                const descEntry = data.flavor_text_entries.find(e => e.language.name === 'es');
                const description = descEntry ? descEntry.text.replace(/\f/g, ' ') : 'Sin descripción en español.';
                const category = data.category.name;
                const cost = data.cost;

                // GENERACIÓN DE LISTA CON IMÁGENES
                let heldByHtml = '<p>Ninguno conocido.</p>';
                if (data.held_by_pokemon && data.held_by_pokemon.length > 0) {
                    // Limitamos a 15 para no saturar el modal
                    const list = data.held_by_pokemon.slice(0, 15).map(h => {
                        const id = getIdFromUrl(h.pokemon.url);
                        // URL de la imagen sprite estándar
                        const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
                        return `
                            <div class="mini-pokemon-card" onclick="fetchPokemonById(${id})">
                                <img src="${imgUrl}" alt="${h.pokemon.name}" loading="lazy">
                                <span>${h.pokemon.name}</span>
                            </div>
                        `;
                    }).join('');
                    heldByHtml = `<div class="held-by-list">${list}</div>`;
                }
                
                const imgSrc = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${item.name}.png`;

                modalBody.innerHTML = `
                    <div style="text-align:center; margin-bottom:1rem;">
                        <img src="${imgSrc}" style="width:100px; border:1px solid var(--border-color); padding:10px; border-radius:10px; background:white;">
                        <div style="font-size:0.9rem; color:var(--text-secondary); margin-top:5px;">Categoría: ${category}</div>
                        <div style="font-size:0.9rem; color:var(--text-secondary);">Costo: ${cost} ₽</div>
                    </div>

                    <p style="background:var(--bg-body); padding:1rem; border-radius:8px;">${description}</p>

                    <h4 style="margin:1rem 0;">Pokémon que lo pueden llevar:</h4>
                    ${heldByHtml}
                `;

            } catch (e) {
                console.error(e);
                modalBody.innerHTML = '<p>Error cargando objeto.</p>';
            }
        }

        function getIdFromUrl(url) {
            const parts = url.split('/');
            return parseInt(parts[parts.length - 2]);
        }

        async function fetchPokemonById(id) {
            if(STATE.currentTab !== 'pokemon') {
                document.querySelector('[data-tab="pokemon"]').click();
            }
            const res = await fetch(API.base + API.pokemonData(id));
            const data = await res.json();
            data.spanishName = await getSpanishName(data.species.url);
            openPokemonModal(data);
        }

        function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    </script>
</body>
</html>
