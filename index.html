<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Ultimate - Scroll Infinito</title>
    <style>
        /* =========================================
           VARIABLES Y TEMAS
           ========================================= */
        :root {
            --bg-body: #f6f8fc;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-color: #ef5350;
            --accent-hover: #d32f2f;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --input-bg: #ffffff;
            
            /* Tipos */
            --type-normal: #A8A77A; --type-fire: #EE8130; --type-water: #6390F0;
            --type-electric: #F7D02C; --type-grass: #7AC74C; --type-ice: #96D9D6;
            --type-fighting: #C22E28; --type-poison: #A33EA1; --type-ground: #E2BF65;
            --type-flying: #A98FF3; --type-psychic: #F95587; --type-bug: #A6B91A;
            --type-rock: #B6A136; --type-ghost: #735797; --type-dragon: #6F35FC;
            --type-dark: #705746; --type-steel: #B7B7CE; --type-fairy: #D685AD;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-header: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #b0bec5;
            --border-color: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --modal-overlay: rgba(0, 0, 0, 0.9);
            --input-bg: #2c2c2c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
        
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 40px; }

        /* =========================================
           HEADER & NAVEGACIÓN
           ========================================= */
        header {
            background: var(--bg-header);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); display: flex; align-items: center; gap: 10px; }
        .logo span { background: var(--accent-color); color: white; padding: 2px 8px; border-radius: 4px; }

        /* Dropdown Tema */
        .theme-dropdown { position: relative; z-index: 101; }
        .theme-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .theme-content { display: none; position: absolute; right: 0; background: var(--bg-card); min-width: 150px; box-shadow: var(--shadow); border-radius: 8px; border: 1px solid var(--border-color); z-index: 102; margin-top: 5px; overflow: hidden; }
        .theme-content a { padding: 12px 16px; text-decoration: none; color: var(--text-main); display: block; cursor: pointer; }
        .theme-content a:hover { background: var(--bg-body); }
        .show { display: block; }

        /* =========================================
           FILTROS Y CONTROLES
           ========================================= */
        .controls { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); }
        .tab-btn { background: none; border: none; padding: 0.8rem 1.5rem; font-size: 1rem; color: var(--text-secondary); cursor: pointer; position: relative; font-weight: 600; }
        .tab-btn.active { color: var(--accent-color); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--accent-color); }

        .filter-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; background: var(--bg-card); padding: 1.5rem; border-radius: 16px; box-shadow: var(--shadow); }
        
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; }
        .input-control { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 1rem; outline: none; }
        .input-control:focus { border-color: var(--accent-color); }

        /* =========================================
           GRID PRINCIPAL (RESPONSIVE)
           ========================================= */
        .grid-container { 
            display: grid; 
            /* Por defecto escritorio: mínimo 160px */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 1.5rem; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 1rem; 
        }
        
        .card {
            background: var(--bg-card); border-radius: 16px; overflow: hidden; cursor: pointer;
            box-shadow: var(--shadow); border: 1px solid var(--border-color); position: relative;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 1rem;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }

        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100px; z-index: 0; opacity: 0.15; }
        
        .card-img-container { position: relative; z-index: 1; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .card-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }

        .card-info { z-index: 1; text-align: center; width: 100%; padding: 0 10px; }
        .card-id { font-size: 0.8rem; color: var(--text-secondary); font-weight: bold; }
        .card-name { font-size: 1.1rem; text-transform: capitalize; margin: 0.3rem 0; color: var(--text-main); font-weight: 700; }
        
        .types-mini { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .type-pill { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; color: white; text-transform: capitalize; font-weight: 600; }

        /* =========================================
           MODAL
           ========================================= */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(5px); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal.open { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-card); width: 95%; max-width: 800px; max-height: 90vh; border-radius: 24px; overflow-y: auto; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .modal-header { padding: 2rem; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        .close-modal { 
            position: absolute; top: 15px; right: 20px; font-size: 2.5rem; 
            background: none; border: none; color: var(--text-secondary); 
            cursor: pointer; z-index: 2000; line-height: 1; padding: 0 10px;
        }
        .close-modal:hover { color: var(--accent-color); transform: scale(1.1); }
        
        .modal-pokemon-img { width: 200px; height: 200px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); margin-bottom: 1rem; }
        .modal-item-img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 1rem; }
        
        .modal-body { padding: 2rem; }
        .section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem; color: var(--text-main); border-left: 4px solid var(--accent-color); padding-left: 10px; margin-top: 1.5rem; }

        /* Estadísticas */
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 0.8rem; margin-bottom: 2rem; }
        .stat-row { display: flex; align-items: center; font-size: 0.9rem; }
        .stat-name { width: 100px; font-weight: 600; color: var(--text-secondary); }
        .stat-val { width: 40px; font-weight: bold; text-align: right; margin-right: 10px; }
        .stat-bar-bg { flex: 1; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--accent-color); border-radius: 4px; }

        /* Evolución */
        .evo-chain { display: flex; flex-direction: column; gap: 1rem; }
        .evo-step { display: flex; align-items: center; background: var(--bg-body); padding: 1rem; border-radius: 12px; gap: 1rem; }
        .evo-img { width: 60px; height: 60px; }
        .evo-info { flex: 1; }
        .evo-name { font-weight: bold; text-transform: capitalize; }
        .evo-detail { font-size: 0.8rem; color: var(--accent-color); background: rgba(239, 83, 80, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }

        /* Estilos para Detalles de Objeto */
        .item-detail-row { margin-bottom: 1rem; display: flex; align-items: flex-start; }
        .item-label { font-weight: bold; color: var(--text-secondary); width: 100px; flex-shrink: 0; padding-top: 4px; }
        .item-text { color: var(--text-main); line-height: 1.6; }
        .item-flavor { 
            font-style: italic; color: var(--text-main); 
            background: var(--bg-body); padding: 1.5rem; 
            border-radius: 12px; margin-top: 1rem; 
            border-left: 4px solid var(--accent-color); 
            font-size: 1.05rem; line-height: 1.6;
        }

        /* Grid de Pokémon que pueden usar el objeto */
        .held-by-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .mini-poke-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-body);
            padding: 8px 4px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .mini-poke-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
            background: var(--bg-card);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .mini-poke-card img { width: 50px; height: 50px; object-fit: contain; }
        .mini-poke-card span { 
            font-size: 0.7rem; text-transform: capitalize; 
            text-align: center; margin-top: 5px; 
            color: var(--text-main); font-weight: 600;
        }

        /* Loader */
        .loader { display: none; text-align: center; margin: 2rem; font-size: 1.2rem; color: var(--text-secondary); }
        
        /* Ocultamos el botón de cargar más, usamos scroll infinito */
        .load-more-btn { display: none; }

        /* Items Grid Style */
        .items-grid .card-img { width: 80px; height: 80px; }
        .items-grid .card-img-container { height: 100px; }

        /* =========================================
           MEDIA QUERY MÓVIL (OPTIMIZADO)
           ========================================= */
        @media (max-width: 600px) {
            /* Filtros más compactos */
            .filter-bar { grid-template-columns: 1fr; padding: 1rem; }
            
            /* GRID MÁS DENSO */
            .grid-container {
                /* Reduce el mínimo a 100px para caben 3 o 4 columnas */
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px; 
                padding: 0 10px;
            }

            /* Tarjetas más pequeñas en móvil */
            .card-img-container { width: 80px; height: 80px; }
            .card-name { font-size: 0.9rem; margin: 0.2rem 0; }
            .card-id { font-size: 0.7rem; }
            .type-pill { font-size: 0.55rem; padding: 1px 6px; }
            
            /* Modal optimizado */
            .modal-content { width: 100%; height: 100%; border-radius: 0; max-height: 100vh; }
            .item-detail-row { flex-direction: column; gap: 5px; }
            .item-label { width: 100%; }
            
            /* Evolución en columna en móvil */
            .evo-step { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>PK</span> Pokedex Ultimate</div>
        <div class="theme-dropdown">
            <button class="theme-btn" onclick="toggleTheme()">
                <span id="themeIcon">☀️</span> Tema
            </button>
        </div>
    </header>

    <div class="controls">
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('pokemon')">Pokémon</button>
            <button class="tab-btn" onclick="switchTab('items')">Objetos</button>
        </nav>

        <div class="filter-bar" id="pokemonFilters">
            <!-- Búsqueda -->
            <div class="input-group">
                <label>Buscar por Nombre</label>
                <input type="text" id="searchInput" class="input-control" placeholder="Ej: Pikachu..." onkeyup="debounceSearch()">
            </div>

            <!-- Filtro Generación -->
            <div class="input-group">
                <label>Generación</label>
                <select id="genSelect" class="input-control" onchange="applyFilters()">
                    <option value="all">Todas las Generaciones</option>
                    <option value="1">Gen 1 (Kanto) 1-151</option>
                    <option value="2">Gen 2 (Johto) 152-251</option>
                    <option value="3">Gen 3 (Hoenn) 252-386</option>
                    <option value="4">Gen 4 (Sinnoh) 387-493</option>
                    <option value="5">Gen 5 (Unova) 494-649</option>
                    <option value="6">Gen 6 (Kalos) 650-721</option>
                    <option value="7">Gen 7 (Alola) 722-809</option>
                    <option value="8">Gen 8 (Galar) 810-905</option>
                    <option value="9">Gen 9 (Paldea) 906-1025</option>
                </select>
            </div>

            <!-- Filtro Elemento (TIPO) -->
            <div class="input-group">
                <label>Elemento / Tipo</label>
                <select id="typeSelect" class="input-control" onchange="applyFilters()">
                    <option value="all">Todos los Elementos</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fuego</option>
                    <option value="water">Agua</option>
                    <option value="grass">Planta</option>
                    <option value="electric">Eléctrico</option>
                    <option value="ice">Hielo</option>
                    <option value="fighting">Lucha</option>
                    <option value="poison">Veneno</option>
                    <option value="ground">Tierra</option>
                    <option value="flying">Volador</option>
                    <option value="psychic">Psíquico</option>
                    <option value="bug">Bicho</option>
                    <option value="rock">Roca</option>
                    <option value="ghost">Fantasma</option>
                    <option value="dragon">Dragón</option>
                    <option value="steel">Acero</option>
                    <option value="fairy">Hada</option>
                </select>
            </div>
        </div>
        
        <!-- Filtros para Items -->
        <div class="filter-bar" id="itemsFilters" style="display:none;">
            <div class="input-group">
                <label>Buscar Objeto</label>
                <input type="text" id="itemSearchInput" class="input-control" placeholder="Piedra, Poción..." onkeyup="filterItems()">
            </div>
        </div>
    </div>

    <main>
        <div id="grid" class="grid-container"></div>
        
        <!-- Loader visual -->
        <div id="loader" class="loader">Cargando más datos...</div>
        
        <!-- Elemento centinela para el Scroll Infinito -->
        <div id="scroll-sentinel" style="height: 20px;"></div>
    </main>
    
    <!-- Botón oculto por defecto (fallback visual si falla JS, pero no se usa) -->
    <button id="loadMoreBtn" class="load-more-btn" onclick="loadMore()">Cargar más</button>

    <!-- MODAL -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="modalHeader" class="modal-header">
                <!-- Contenido inyectado -->
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Contenido inyectado -->
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // CONFIGURACIÓN
        // =========================================
        const API_BASE = 'https://pokeapi.co/api/v2';
        let state = {
            currentTab: 'pokemon',
            allPokemonList: [], 
            filteredList: [],   
            allItemsList: [], 
            filteredItemsList: [],
            offset: 0,
            limit: 20, // Cantidad a cargar por lote
            isLoading: false
        };

        const typeColors = {
            normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
            grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
            ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
            rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', dark: '#705746',
            steel: '#B7B7CE', fairy: '#D685AD'
        };

        const typeTranslations = {
            normal: 'Normal', fire: 'Fuego', water: 'Agua', electric: 'Eléctrico',
            grass: 'Planta', ice: 'Hielo', fighting: 'Lucha', poison: 'Veneno',
            ground: 'Tierra', flying: 'Volador', psychic: 'Psíquico', bug: 'Bicho',
            rock: 'Roca', ghost: 'Fantasma', dragon: 'Dragón', dark: 'Siniestro',
            steel: 'Acero', fairy: 'Hada'
        };

        const statTranslations = {
            'hp': 'PS', 'attack': 'Ataque', 'defense': 'Defensa',
            'special-attack': 'Atq. Esp.', 'special-defense': 'Def. Esp.', 'speed': 'Velocidad'
        };

        // =========================================
        // INICIO & OBSERVER (SCROLL INFINITO)
        // =========================================
        window.addEventListener('DOMContentLoaded', async () => {
            // Configurar Intersection Observer para el scroll infinito
            const sentinel = document.getElementById('scroll-sentinel');
            
            const observer = new IntersectionObserver((entries) => {
                // Si el centinela es visible y no estamos cargando ya
                if(entries[0].isIntersecting && !state.isLoading) {
                    loadMore();
                }
            }, {
                rootMargin: '100px' // Comienza a cargar 100px antes de llegar al final
            });

            observer.observe(sentinel);

            // Cargar datos iniciales
            try {
                const res = await fetch(`${API_BASE}/pokemon?limit=10000`);
                const data = await res.json();
                state.allPokemonList = data.results;
                state.filteredList = data.results;
                renderBatch(); 
            } catch (error) {
                console.error(error);
                document.getElementById('grid').innerHTML = '<p style="text-align:center;">Error de conexión.</p>';
            }
        });

        // =========================================
        // RENDERIZADO
        // =========================================
        async function renderBatch() {
            if (state.isLoading) return;
            state.isLoading = true;
            document.getElementById('loader').style.display = 'block';

            const grid = document.getElementById('grid');
            if (state.offset === 0) grid.innerHTML = '';

            let sourceList = state.currentTab === 'pokemon' ? state.filteredList : state.filteredItemsList;
            let batch = sourceList.slice(state.offset, state.offset + state.limit);
            
            if(batch.length === 0 && state.offset === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1/-1;">No se encontraron resultados.</p>';
                state.isLoading = false;
                document.getElementById('loader').style.display = 'none';
                return;
            }

            let promises = [];
            if(state.currentTab === 'pokemon') {
                promises = batch.map(p => fetch(p.url).then(r => r.json()));
            } else {
                promises = batch.map(i => fetch(i.url).then(r => r.json()));
            }

            const results = await Promise.all(promises);

            results.forEach(data => {
                if(!data) return;
                const card = state.currentTab === 'pokemon' ? createPokemonCard(data) : createItemCard(data);
                grid.appendChild(card);
            });

            state.offset += state.limit;
            state.isLoading = false;
            
            // Solo ocultamos loader si no hay más datos
            if (state.offset >= sourceList.length) {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function createPokemonCard(pokemon) {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => openPokemonModal(pokemon);

            const mainType = pokemon.types[0].type.name;
            const color = typeColors[mainType] || '#ccc';
            
            const typesHTML = pokemon.types.map(t => 
                `<span class="type-pill" style="background:${typeColors[t.type.name]}">${typeTranslations[t.type.name]}</span>`
            ).join('');

            const img = pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default;

            div.innerHTML = `
                <div class="card-bg" style="background-color: ${color}"></div>
                <div class="card-img-container">
                    <img src="${img}" alt="${pokemon.name}" class="card-img" loading="lazy">
                </div>
                <div class="card-info">
                    <div class="card-id">#${pokemon.id.toString().padStart(4, '0')}</div>
                    <div class="card-name">${pokemon.name}</div>
                    <div class="types-mini">${typesHTML}</div>
                </div>
            `;
            return div;
        }

        function createItemCard(item) {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => openItemModal(item);

            let imgSrc = 'https://via.placeholder.com/96?text=?';
            if(item.sprites && item.sprites.default) {
                imgSrc = item.sprites.default;
            }

            div.innerHTML = `
                <div class="card-img-container">
                    <img src="${imgSrc}" class="card-img" loading="lazy">
                </div>
                <div class="card-info">
                    <div class="card-name" style="font-size:0.9rem">${item.name.replace(/-/g, ' ')}</div>
                    <div style="font-size:0.7rem; color:var(--text-secondary); margin-top:4px; text-transform:capitalize;">${item.category.name.replace(/-/g, ' ')}</div>
                </div>
            `;
            return div;
        }

        function loadMore() {
            renderBatch();
        }

        // =========================================
        // DETALLES POKEMON
        // =========================================
        async function openPokemonModal(pokemon) {
            const modal = document.getElementById('detailModal');
            const header = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');
            
            showModalBase(modal);
            
            const mainType = pokemon.types[0].type.name;
            const color = typeColors[mainType];

            header.style.background = `linear-gradient(to bottom, ${color}dd, var(--bg-card))`;
            header.innerHTML = `
                <img src="${pokemon.sprites.other['official-artwork'].front_default}" class="modal-pokemon-img">
                <h2 style="text-transform:capitalize; font-size:2rem; color: var(--text-main)">${pokemon.name}</h2>
                <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                    ${pokemon.types.map(t => `<span class="type-pill" style="background:var(--bg-card); color:${typeColors[t.type.name]}; border:1px solid ${typeColors[t.type.name]}">${typeTranslations[t.type.name]}</span>`).join('')}
                </div>
            `;

            let statsHTML = '<div class="section-title">Estadísticas Base</div><div class="stats-grid">';
            pokemon.stats.forEach(s => {
                const val = s.base_stat;
                const percent = Math.min((val / 255) * 100, 100);
                statsHTML += `
                    <div class="stat-row">
                        <div class="stat-name">${statTranslations[s.stat.name] || s.stat.name}</div>
                        <div class="stat-val">${val}</div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${percent}%; background-color: ${color}"></div></div>
                    </div>
                `;
            });
            statsHTML += '</div>';

            body.innerHTML = statsHTML + '<div id="evoContainer" class="loader">Cargando evoluciones...</div>';
            
            try {
                const speciesRes = await fetch(pokemon.species.url);
                const speciesData = await speciesRes.json();
                const evoRes = await fetch(speciesData.evolution_chain.url);
                const evoData = await evoRes.json();
                
                const evoChainHTML = parseEvolutionChain(evoData.chain);
                document.getElementById('evoContainer').outerHTML = `
                    <div class="section-title" style="margin-top:2rem">Línea Evolutiva</div>
                    <div class="evo-chain">${evoChainHTML}</div>
                `;
            } catch (e) {
                document.getElementById('evoContainer').innerText = "No hay datos de evolución.";
            }
        }

        // =========================================
        // DETALLES OBJETO + POKEMON QUE LO USAN
        // =========================================
        async function openItemModal(item) {
            const modal = document.getElementById('detailModal');
            const header = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');

            showModalBase(modal);

            // --- Datos en Español ---
            let flavorText = "No hay traducción al español disponible.";
            if(item.flavor_text_entries && item.flavor_text_entries.length > 0) {
                const esEntry = item.flavor_text_entries.find(entry => entry.language.name === 'es');
                if(esEntry) flavorText = esEntry.text.replace(/[\f\n\r]/g, ' ').replace(/\s+/g, ' ').trim();
            }

            let effectText = "Efecto desconocido.";
            if(item.effect_entries && item.effect_entries.length > 0) {
                const esEffect = item.effect_entries.find(entry => entry.language.name === 'es');
                if(esEffect) effectText = esEffect.short_effect.replace(/[\f\n\r]/g, ' ').trim();
            }

            let imgSrc = 'https://via.placeholder.com/150?text=?';
            if(item.sprites && item.sprites.default) imgSrc = item.sprites.default;

            header.style.background = `linear-gradient(to bottom, var(--accent-color)dd, var(--bg-card))`;
            header.innerHTML = `
                <img src="${imgSrc}" class="modal-item-img">
                <h2 style="text-transform:capitalize; font-size:2rem; color: var(--text-main)">${item.name.replace(/-/g, ' ')}</h2>
                <div style="margin-top:5px; color:var(--text-secondary); font-weight:bold; background:rgba(0,0,0,0.05); padding:5px 15px; border-radius:20px; text-transform:capitalize;">
                    ${item.category.name.replace(/-/g, ' ')}
                </div>
            `;

            // --- SECCIÓN POKEMON QUE PUEDEN USARLO ---
            let heldByHTML = '';
            if (item.held_by_pokemon && item.held_by_pokemon.length > 0) {
                const holders = item.held_by_pokemon.slice(0, 20);
                heldByHTML += `<div class="section-title">Pokémon que lo pueden sostener</div>`;
                heldByHTML += `<div class="held-by-grid">`;
                
                holders.forEach(h => {
                    const pName = h.pokemon.name;
                    const pId = h.pokemon.url.split('/').filter(Boolean).pop();
                    const pImg = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pId}.png`;
                    
                    heldByHTML += `
                        <div class="mini-poke-card" onclick="switchToPokemonFromItem('${pName}')" title="Ver ficha de ${pName}">
                            <img src="${pImg}" loading="lazy">
                            <span>${pName.replace(/-/g, ' ')}</span>
                        </div>
                    `;
                });

                if (item.held_by_pokemon.length > 20) {
                    heldByHTML += `<div style="grid-column: 1/-1; text-align:center; font-size:0.8rem; color:var(--text-secondary); padding-top:10px;">...y ${item.held_by_pokemon.length - 20} más</div>`;
                }
                heldByHTML += `</div>`;
            } else {
                heldByHTML += `<div class="section-title">Uso</div><p style="color:var(--text-secondary)">Este es un objeto de consumo o herramienta que no suele llevarse equipado por Pokémon en la naturaleza.</p>`;
            }

            body.innerHTML = `
                <div class="item-detail-row">
                    <div class="item-label">Efecto:</div>
                    <div class="item-text">${effectText}</div>
                </div>
                <div class="section-title">Descripción</div>
                <div class="item-flavor">${flavorText}</div>
                <div class="item-detail-row" style="margin-top:1rem">
                    <div class="item-label">Coste:</div>
                    <div class="item-text">${item.cost} Pokédólares</div>
                </div>
                ${heldByHTML}
            `;
        }

        // =========================================
        // UTILIDADES
        // =========================================
        function showModalBase(modal) {
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        async function switchToPokemonFromItem(pokemonName) {
            closeModal();
            setTimeout(async () => {
                const tabs = document.querySelectorAll('.tab-btn');
                tabs[0].click(); 

                const target = state.allPokemonList.find(p => p.name === pokemonName);
                
                if (target) {
                    document.getElementById('searchInput').value = pokemonName;
                    applyFilters(); 
                    
                    try {
                        const res = await fetch(target.url);
                        const data = await res.json();
                        openPokemonModal(data);
                    } catch(e) { console.error(e); }
                }
            }, 300);
        }

        window.onclick = function(e) {
            const modal = document.getElementById('detailModal');
            if (e.target == modal) {
                closeModal();
            }
        }

        function parseEvolutionChain(chain) {
            let html = '';
            let current = chain;
            while(current) {
                const name = current.species.name;
                const id = current.species.url.split('/').filter(Boolean).pop();
                const img = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
                
                let details = 'Forma base';
                if (current.evolution_details.length > 0) {
                    const d = current.evolution_details[0];
                    if (d.min_level) details = `Nivel ${d.min_level}`;
                    else if (d.item) details = `Usar ${d.item.name.replace('-', ' ')}`;
                    else if (d.trigger.name === 'trade') details = 'Intercambio';
                    else if (d.min_happiness) details = 'Alta Amistad';
                    else details = d.trigger.name;
                }

                html += `
                    <div class="evo-step">
                        <img src="${img}" class="evo-img">
                        <div class="evo-info">
                            <div class="evo-name">${name}</div>
                            <div class="evo-detail">${details}</div>
                        </div>
                    </div>
                `;

                if (current.evolves_to.length > 0) {
                    current = current.evolves_to[0]; 
                    html += `<div style="text-align:center; color:var(--text-secondary)">↓</div>`;
                } else {
                    break;
                }
            }
            return html;
        }

        // =========================================
        // FILTROS Y TABS
        // =========================================
        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 500);
        }

        async function applyFilters() {
            if(state.currentTab !== 'pokemon') return;

            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const genValue = document.getElementById('genSelect').value;
            const typeValue = document.getElementById('typeSelect').value;

            state.offset = 0;
            document.getElementById('grid').innerHTML = '';
            
            let filtered = state.allPokemonList.filter(p => p.name.includes(searchText));

            if (typeValue !== 'all') {
                try {
                    const res = await fetch(`${API_BASE}/type/${typeValue}`);
                    const data = await res.json();
                    const typePokemonNames = new Set(data.pokemon.map(p => p.pokemon.name));
                    filtered = filtered.filter(p => typePokemonNames.has(p.name));
                } catch (e) { console.error(e); }
            }

            if (genValue !== 'all') {
                const genRanges = {
                    1: [1, 151], 2: [152, 251], 3: [252, 386], 4: [387, 493],
                    5: [494, 649], 6: [650, 721], 7: [722, 809], 8: [810, 905], 9: [906, 1025]
                };
                const [min, max] = genRanges[genValue];
                filtered = filtered.filter(p => {
                    const id = parseInt(p.url.split('/').filter(Boolean).pop());
                    return id >= min && id <= max;
                });
            }

            state.filteredList = filtered;
            renderBatch();
        }

        async function switchTab(tab) {
            state.currentTab = tab;
            state.offset = 0; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const grid = document.getElementById('grid');
            const pokeFilters = document.getElementById('pokemonFilters');
            const itemsFilters = document.getElementById('itemsFilters');
            // El loader se maneja ahora por el observer

            if (tab === 'pokemon') {
                pokeFilters.style.display = 'grid';
                itemsFilters.style.display = 'none';
                grid.className = 'grid-container';
                if(state.filteredList.length === 0) applyFilters();
                else renderBatch();
            } else {
                pokeFilters.style.display = 'none';
                itemsFilters.style.display = 'grid';
                grid.className = 'grid-container items-grid';
                grid.innerHTML = '';
                loadItems();
            }
        }

        async function loadItems() {
            if(state.allItemsList.length === 0) {
                try {
                    const res = await fetch(`${API_BASE}/item?limit=5000`);
                    const data = await res.json();
                    state.allItemsList = data.results;
                    state.filteredItemsList = data.results;
                } catch (e) { console.error(e); return; }
            } else {
                state.filteredItemsList = state.allItemsList;
                state.offset = 0;
            }
            renderBatch();
        }

        function filterItems() {
            const term = document.getElementById('itemSearchInput').value.toLowerCase();
            state.filteredItemsList = state.allItemsList.filter(i => i.name.includes(term));
            state.offset = 0;
            document.getElementById('grid').innerHTML = '';
            renderBatch();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.innerText = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
